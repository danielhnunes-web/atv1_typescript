<!DOCTYPE html>
<html lang="pt-BR">
    
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CRUD de Clientes</title>

        <link rel="stylesheet" href="css/style.css">
        
        <!-- <script src="app.tsx/app.ts" defer></script> -->
        <script src="app.tsx/script.js" defer></script>
</head>

<body>

    <h1>Cadastro de Clientes</h1>

    <form id="formulario">
        <input type="text" id="nome" placeholder="Nome" name="nome">
        <input type="email" id="email" placeholder="Email" name="email">
        <input type="number" id="telefone" placeholder="Telefone" name="telefone">
        <button id="btnSalvar" type="submit">
            Salvar Cliente
        </button>
    </form>

    <h2>Lista de Clientes</h2>

    <table>
        <thead>
            <tr class="titulos">
                <th>ID</th>
                <th>Nome</th>
                <th>Email</th>
                <th>Telefone</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="listaClientes">
        </tbody>
    </table>


</body>

</html>
